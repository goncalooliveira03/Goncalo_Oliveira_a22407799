{% extends "portfolio/base.html" %}

{% block content %}
<div style="max-width:700px; margin:40px auto; padding:0 20px;">
    <h2>{{ titulo }}</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
        <a href="{% url 'artigos:lista' %}">Cancelar</a>
    </form>
</div>
{% endblock %}
