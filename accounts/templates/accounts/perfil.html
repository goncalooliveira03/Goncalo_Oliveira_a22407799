{% extends 'portfolio/base.html' %}

{% block content %}
<div class="auth-container">
    <h2>Perfil</h2>
    <section class="auth-section">
        <p><strong>Utilizador:</strong> {{ request.user.username }}</p>
        <p><strong>Email:</strong> {{ request.user.email }}</p>
        <p><strong>Grupos:</strong>
            {% for group in request.user.groups.all %}
                <span class="badge">{{ group.name }}</span>
            {% empty %}Nenhum grupo{% endfor %}
        </p>
    </section>
    <div class="auth-footer">
        <a href="{% url 'accounts:logout' %}" class="btn btn-danger">Terminar sessão</a>
    </div>
</div>
{% endblock %}
