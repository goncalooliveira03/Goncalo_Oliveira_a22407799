{% extends "portfolio/base.html" %}

{% block content %}
<h2>TFCs</h2>
<section>
    {% for tfc in tfcs %}
    <article>
        <header>
            <h3>{{ tfc.titulo }}</h3>
            <p>{{ tfc.autor }} — {{ tfc.ano }}</p>
        </header>
        <section>
            <p>Orientador: {{ tfc.orientador.nome }}</p>
            <p>{{ tfc.resumo }}</p>
        </section>
    </article>
    {% endfor %}
</section>
{% endblock %}
